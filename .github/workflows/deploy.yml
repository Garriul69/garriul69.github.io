name: Deploy to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Astro site
        uses: withastro/action@v3
        with:
          # pnpm 11.x requires Node.js >= 22.13 (uses node:sqlite)
          node-version: 22
        # The action auto-detects pnpm from pnpm-lock.yaml, installs,
        # runs `astro build`, and uploads ./dist as the Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
